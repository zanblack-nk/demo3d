<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Моя 3D Модель</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
const createScene = function () {
    // 1. СНАЧАЛА создаем саму сцену (объект)
    const scene = new BABYLON.Scene(engine);

    // 2. И ТОЛЬКО ПОТОМ настраиваем её параметры (цвет, туман и т.д.)
    scene.clearColor = new BABYLON.Color3(0.5, 0.8, 0.5);

    // 1. Сразу создаем камеру, чтобы движку было через что смотреть
    const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 5, new BABYLON.Vector3(0, 0, 0), scene);
    camera.attachControl(canvas, true);

    // 2. Сразу добавляем свет

    // 1. Оставляем общий мягкий свет (уменьшим яркость, чтобы он не "забивал" тени)
const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(1, -1, 0), scene);
light.intensity = 1.5; 

// 2. Добавляем направленный свет (как солнце)
const directionalLight = new BABYLON.DirectionalLight("dir01", new BABYLON.Vector3(-1, -2, -1), scene);
directionalLight.position = new BABYLON.Vector3(20, 40, 20); // С какой точки светим
directionalLight.intensity = 1.5; // Настраиваем яркость по вкусу

    const modelPath = ""; 
    const modelName = "ra-etna-m.glb";

    // 3. Загружаем модель асинхронно
    BABYLON.SceneLoader.ImportMesh("", modelPath, modelName, scene, function (meshes) {
        // Когда модель прилетит, эта команда «подлетит» камерой к ней
        scene.createDefaultCameraOrLight(true, true, true);
        
        // Снова привязываем управление к новой авто-камере
        scene.activeCamera.attachControl(canvas, true);
        
        console.log("Модель загружена, камера настроена!");
    });

    return scene;
};
// Находим холст
const canvas = document.getElementById("renderCanvas"); 

// Создаем "двигатель"
const engine = new BABYLON.Engine(canvas, true); 

// Запускаем создание сцены
const scene = createScene(); 

// Запускаем бесконечный цикл отрисовки (60 кадров в секунду)
engine.runRenderLoop(function () {
    scene.render();
});

// Следим за размером окна
window.addEventListener("resize", function () {
    engine.resize();
});
    </script>
</body>
</html>
