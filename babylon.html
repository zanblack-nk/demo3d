<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Моя 3D Модель</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);

            // 1. Пути к модели (теперь только один раз!)
            const modelPath = ""; 
            const modelName = "ra-etna-m.glb";

            // 2. Базовый свет (чтобы модель не была черной)
            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

            // 3. Загрузка модели
            BABYLON.SceneLoader.ImportMesh("", modelPath, modelName, scene, function (meshes) {
                // Авто-создание камеры, которая облетит всю модель
                scene.createDefaultCameraOrLight(true, true, true);
                scene.activeCamera.attachControl(canvas, true);
                
                console.log("Модель успешно загружена!");
            });

            return scene;
        };

        const scene = createScene();

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
