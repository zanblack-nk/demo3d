<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Моя 3D Модель</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = function () {const createScene = function () {
    const scene = new BABYLON.Scene(engine);

    // Удаляем старые ссылки на zan-black.ru и оставляем только это:
    const modelPath = ""; 
    const modelName = "ra-etna-m.glb";

    // Настройка света и камеры
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
    const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 5, new BABYLON.Vector3(0, 0, 0), scene);
    camera.attachControl(canvas, true);

    // Загрузка модели
    BABYLON.SceneLoader.ImportMesh("", modelPath, modelName, scene, function (meshes) {
        scene.createDefaultCameraOrLight(true, true, true);
        scene.activeCamera.attachControl(canvas, true);
        console.log("Успех! Модель в сцене.");
    });

    return scene;
};

        const scene = createScene();

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
