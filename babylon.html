<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Моя 3D Модель</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
const createScene = function () {
    const scene = new BABYLON.Scene(engine);

    // 1. Сразу создаем камеру, чтобы движку было через что смотреть
    const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 2.5, 5, new BABYLON.Vector3(0, 0, 0), scene);
    camera.attachControl(canvas, true);

    // 2. Сразу добавляем свет
    const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

    const modelPath = ""; 
    const modelName = "ra-etna-m.glb";

    // 3. Загружаем модель асинхронно
    BABYLON.SceneLoader.ImportMesh("", modelPath, modelName, scene, function (meshes) {
        // Когда модель прилетит, эта команда «подлетит» камерой к ней
        scene.createDefaultCameraOrLight(true, true, true);
        
        // Снова привязываем управление к новой авто-камере
        scene.activeCamera.attachControl(canvas, true);
        
        console.log("Модель загружена, камера настроена!");
    });

    return scene;
};
    </script>
</body>
</html>
